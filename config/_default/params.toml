# site params
version = "0.4.X"
defaultTheme = "auto"
dateFormat = "2006-01-02"
images = []
enablePWA = false

[author]
  name = "john"
  avatar = "/images/avatar.webp"

[header]
  themeChangeMode = "select"
  [header.title]
    name = "AI Blog"
    typeit = false

[footer]
  enable = true
  hugo = true
  copyright = true
  author = true
  since = 2026

[section]
  paginate = 10
  dateFormat = "01-02"
  rss = 10

[list]
  paginate = 10
  dateFormat = "01-02"
  rss = 10

[page]
  hiddenFromHomePage = false
  hiddenFromSearch = false
  twemoji = false
  lightgallery = false
  ruby = true
  fraction = true
  linkToMarkdown = false
  rssFullText = false
  enableLastMod = true
  enableWordCount = true
  enableReadingTime = true

  [page.toc]
    enable = true
    keepStatic = false
    auto = true

  [page.code]
    maxShownLines = 12
    lineNos = true
    wrap = false
    header = true

  [page.table]
    sort = true

  [page.math]
    enable = true
    copyTex = true
    mhchem = true
    mathjax = false

  [page.mapbox]
    accessToken = ""

  [page.share]
    enable = false

  [page.comment]
    enable = false

  [page.related]
    enable = true
    count = 5

# search using Fuse.js (offline, no external service)
[search]
  enable = true
  type = "fuse"
  contentLength = 4000
  placeholder = ""
  maxResultLength = 10
  highlightTag = "em"
  absoluteURL = false
  [search.fuse]
    isCaseSensitive = false
    minMatchCharLength = 2
    findAllMatches = false
    location = 0
    threshold = 0.3
    distance = 100
    ignoreLocation = true
    useExtendedSearch = true
    ignoreFieldNorm = false

[analytics]
  enable = false
